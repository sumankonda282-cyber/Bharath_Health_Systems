name: CI

on:
  push:
    branches: [claude/vigilant-wozniak-H1kwo]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    name: Backend — syntax check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install flake8
        run: pip install flake8

      - name: Syntax check (all Python files)
        # E9: syntax errors, F63: invalid escape, F7: undefined names, F82: undefined names
        # Ignores style warnings — catches only real errors that break the app
        run: flake8 app/ --select=E9,F63,F7,F82 --statistics

  # ── Frontends ──────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — build (${{ matrix.display }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - portal: public
            display: public
          - portal: patient
            display: patient
          - portal: staff
            display: staff (receptionist+manager)
          - portal: provider
            display: provider
          - portal: carechart
            display: carechart
          - portal: pharmacy
            display: pharmacy
          - portal: lab
            display: lab
          - portal: imaging
            display: imaging
          - portal: admin
            display: admin

    defaults:
      run:
        working-directory: frontend/${{ matrix.portal }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/${{ matrix.portal }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://bharatcliniq-api.onrender.com
