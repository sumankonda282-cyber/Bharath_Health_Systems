<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>BharatCliniq | Book Doctor Appointments Online — India's Digital Health Platform</title>
    <meta name="description" content="Find verified doctors and clinics near you. Book appointments instantly, manage prescriptions, lab results and billing — all online. India's trusted clinic management platform." />
    <meta name="keywords" content="book doctor appointment online India, find clinic near me, online OPD booking, digital health platform India, clinic management software India, HMS India, BharatCliniq, patient portal India, hospital management system" />

    <meta name="author" content="Bharath Health Systems" />
    <meta name="theme-color" content="#0F2557" />
    <link rel="canonical" href="https://bharathhealthsystems.com" />

    <!-- Open Graph / Facebook / LinkedIn / WhatsApp -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://bharathhealthsystems.com" />
    <meta property="og:site_name"   content="BharatCliniq" />
    <meta property="og:locale"      content="en_IN" />
    <meta property="og:title"       content="BharatCliniq | Book Doctor Appointments Online" />
    <meta property="og:description" content="Find verified doctors and clinics near you. Book appointments instantly, manage prescriptions, lab results and billing — all online." />
    <meta property="og:image"       content="https://bharathhealthsystems.com/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"    content="BharatCliniq — India's Digital Health Platform" />

    <!-- Twitter Cards -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@BharatCliniq" />
    <meta name="twitter:creator"     content="@BharatCliniq" />
    <meta name="twitter:title"       content="BharatCliniq | Book Doctor Appointments Online" />
    <meta name="twitter:description" content="Find verified doctors and clinics near you. Book appointments instantly, manage prescriptions and lab results — all online." />
    <meta name="twitter:image"       content="https://bharathhealthsystems.com/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />

    <!-- Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "BharatCliniq",
      "alternateName": "Bharath Health Systems",
      "url": "https://bharathhealthsystems.com",
      "logo": "https://bharathhealthsystems.com/favicon.svg",
      "description": "India's digital clinic management platform — connecting patients with verified doctors and helping clinics go paperless.",
      "foundingLocation": { "@type": "Place", "addressCountry": "IN" },
      "sameAs": [
        "https://www.instagram.com/bharatcliniq",
        "https://www.youtube.com/@bharatcliniq",
        "https://www.linkedin.com/company/bharatcliniq"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "email": "support@bharathhealthsystems.com",
        "availableLanguage": ["English", "Hindi", "Telugu"]
      },
      "offers": {
        "@type": "Offer",
        "name": "Clinic Management Platform",
        "description": "Complete digital clinic management — online booking, billing, pharmacy, lab, and patient records.",
        "price": "0",
        "priceCurrency": "INR"
      }
    }
    </script>

    <!-- JSON-LD: WebSite (enables Sitelinks Search Box in Google) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "BharatCliniq",
      "url": "https://bharathhealthsystems.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://bharathhealthsystems.com/clinics?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
