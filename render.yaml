services:
  - type: web
    name: BharathHealthSystems-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: OTP_MOCK
        value: "true"
      - key: CORS_ORIGINS
        value: "https://bharathhealthsystems.com,https://www.bharathhealthsystems.com,https://provider.bharathhealthsystems.com,https://my.bharathhealthsystems.com,https://lab.bharathhealthsystems.com,https://pharmacy.bharathhealthsystems.com,https://staff.bharathhealthsystems.com,https://admin.bharathhealthsystems.com,https://imaging.bharathhealthsystems.com,https://carechart.bharathhealthsystems.com"
      - key: DAILY_API_KEY
        sync: false
      - key: DAILY_DOMAIN
        value: "bharathhealthsystems.daily.co"
