services:
  - type: web
    name: bharatcliniq-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: OTP_MOCK
        value: "true"
      - key: CORS_ORIGINS
        value: "https://bharatcliniq.com,https://www.bharatcliniq.com,https://provider.bharatcliniq.com,https://my.bharatcliniq.com,https://lab.bharatcliniq.com,https://pharmacy.bharatcliniq.com,https://receptionist.bharatcliniq.com,https://bharatcliniq-public.vercel.app,https://bharatcliniq-provider.vercel.app,https://bharatcliniq-patient.vercel.app,https://bharatcliniq-lab.vercel.app,https://bharatcliniq-imaging.vercel.app,https://bharatcliniq-pharmacy.vercel.app,https://bharatcliniq-receptionist.vercel.app,https://bharatcliniq-admin.vercel.app"
